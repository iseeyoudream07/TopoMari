<!doctype html>
<html lang="zh-CN" data-theme="light">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta name="color-scheme" content="light dark" />
    <meta name="theme-color" content="#eeede5" />
    <meta id="site-description" name="description" content="Multi-hop latency and packet-loss visibility" />
    <title>TopoMari</title>
    <link id="site-favicon" rel="icon" href="/favicon" />
    <link rel="apple-touch-icon" href="/favicon" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Arimo:wght@400..700&amp;family=Noto+Serif+SC:wght@400;500;600;700&amp;display=swap" rel="stylesheet" />
    <script src="/frontend/preference-bootstrap.js?v=2.8.4-ui1"></script>
    <link rel="stylesheet" href="/styles.css?v=2.8.4-ui1" />
    <link rel="stylesheet" href="/frontend/theme.css?v=2.8.4-ui1" />
    <script type="module" src="/app.js?v=2.8.4-ui1"></script>
  </head>
  <body>
    <div id="site-background" class="site-background" data-status="idle" hidden aria-hidden="true">
      <div id="site-background-media" class="site-background-media">
        <div id="site-background-image" class="site-background-image" hidden></div>
        <video id="site-background-video" class="site-background-video" muted loop autoplay playsinline preload="auto" hidden></video>
      </div>
      <div id="site-background-overlay" class="site-background-overlay"></div>
    </div>
    <div class="ambient ambient-a" aria-hidden="true"></div>
    <div class="ambient ambient-b" aria-hidden="true"></div>

    <div class="app-shell">
      <section class="overview-stage" aria-label="网络概览" data-i18n-aria-label="topology.aria">
        <header class="app-header">
          <div class="brand-lockup">
            <div class="brand-mark" aria-hidden="true">
              <img src="/favicon" alt="" />
            </div>
            <h1 id="page-title">TopoMari</h1>
          </div>

          <div class="header-actions">
            <div id="source-chip" class="source-chip" data-mode="loading" aria-live="polite">
              <span class="source-dot" aria-hidden="true"></span>
              <span id="source-label" data-i18n="source.connecting">正在连接</span>
            </div>
            <button id="theme-toggle" class="utility-button theme-toggle" type="button" aria-label="切换至夜间模式">
              <svg class="theme-icon theme-icon-sun" viewBox="0 0 24 24" aria-hidden="true">
                <circle cx="12" cy="12" r="4" /><path d="M12 2v2M12 20v2M4.9 4.9l1.4 1.4M17.7 17.7l1.4 1.4M2 12h2M20 12h2M4.9 19.1l1.4-1.4M17.7 6.3l1.4-1.4" />
              </svg>
              <svg class="theme-icon theme-icon-moon" viewBox="0 0 24 24" aria-hidden="true">
                <path d="M20.2 15.4A8.5 8.5 0 0 1 8.6 3.8 8.5 8.5 0 1 0 20.2 15.4Z" />
              </svg>
            </button>
            <a class="utility-button theme-toggle admin-entry" href="/admin" data-i18n-aria-label="admin.enter" aria-label="进入后台" data-i18n-title="admin.enter" title="进入后台">
              <svg class="theme-icon" viewBox="0 0 24 24" aria-hidden="true">
                <circle cx="12" cy="12" r="3" />
                <path d="M19.4 15a1.7 1.7 0 0 0 .3 1.9l.1.1-2.8 2.8-.1-.1a1.7 1.7 0 0 0-1.9-.3 1.7 1.7 0 0 0-1 1.6v.2h-4V21a1.7 1.7 0 0 0-1-1.6 1.7 1.7 0 0 0-1.9.3l-.1.1L4.2 17l.1-.1a1.7 1.7 0 0 0 .3-1.9A1.7 1.7 0 0 0 3 14H2.8v-4H3a1.7 1.7 0 0 0 1.6-1 1.7 1.7 0 0 0-.3-1.9L4.2 7 7 4.2l.1.1A1.7 1.7 0 0 0 9 4.6a1.7 1.7 0 0 0 1-1.6v-.2h4V3a1.7 1.7 0 0 0 1 1.6 1.7 1.7 0 0 0 1.9-.3l.1-.1L19.8 7l-.1.1a1.7 1.7 0 0 0-.3 1.9 1.7 1.7 0 0 0 1.6 1h.2v4H21a1.7 1.7 0 0 0-1.6 1Z" />
              </svg>
            </a>
          </div>
        </header>

        <div class="overview-content">
          <section class="stats-grid">
            <article class="stat-card">
              <div class="stat-card-heading">
                <p class="stat-label" data-i18n="stats.routes">活动链路</p>
                <div class="stat-icon" aria-hidden="true"><svg viewBox="0 0 24 24"><path d="M4 18h16M6 15V9m6 6V5m6 10v-3" /></svg></div>
              </div>
              <p id="stat-routes" class="stat-value">—</p>
            </article>
            <article class="stat-card">
              <div class="stat-card-heading">
                <p class="stat-label" data-i18n="stats.nodes">在线节点</p>
                <div class="stat-icon" aria-hidden="true"><svg viewBox="0 0 24 24"><rect x="4" y="4" width="16" height="6" rx="2" /><rect x="4" y="14" width="16" height="6" rx="2" /><path d="M8 7h.01M8 17h.01" /></svg></div>
              </div>
              <p id="stat-nodes" class="stat-value">—</p>
            </article>
            <article class="stat-card">
              <div class="stat-card-heading">
                <p class="stat-label" data-i18n="stats.latency">平均延迟</p>
                <div class="stat-icon" aria-hidden="true"><svg viewBox="0 0 24 24"><circle cx="12" cy="12" r="8" /><path d="M12 8v4l3 2" /></svg></div>
              </div>
              <p class="stat-value"><span id="stat-latency">—</span><small class="stat-unit">ms</small></p>
            </article>
            <article class="stat-card">
              <div class="stat-card-heading">
                <p class="stat-label" data-i18n="stats.loss">平均丢包</p>
                <div class="stat-icon" aria-hidden="true"><svg viewBox="0 0 24 24"><path d="M12 3 4 7v5c0 5 3.5 8 8 9 4.5-1 8-4 8-9V7z" /><path d="m9 12 2 2 4-4" /></svg></div>
              </div>
              <p class="stat-value"><span id="stat-loss">—</span><small class="stat-unit">%</small></p>
            </article>
            <article class="stat-card">
              <div class="stat-card-heading">
                <p class="stat-label" data-i18n="stats.segments">监测链路段</p>
                <div class="stat-icon" aria-hidden="true"><svg viewBox="0 0 24 24"><circle cx="5" cy="12" r="2" /><circle cx="19" cy="7" r="2" /><path d="m7 11 10-3M7 13l10 3" /><circle cx="19" cy="17" r="2" /></svg></div>
              </div>
              <p id="stat-edges" class="stat-value">—</p>
            </article>
            <article class="stat-card">
              <div class="stat-card-heading">
                <p class="stat-label" data-i18n="stats.alerts">异常链路</p>
                <div class="stat-icon" aria-hidden="true"><svg viewBox="0 0 24 24"><path d="M12 3 2.8 20h18.4L12 3Z" /><path d="M12 9v5M12 17h.01" /></svg></div>
              </div>
              <p id="stat-alerts" class="stat-value">—</p>
            </article>
          </section>

          <figure class="route-globe" aria-label="实时链路传输" data-i18n-aria-label="globe.title">
            <canvas id="route-globe-canvas" role="img" aria-label="地球链路传输动画" data-i18n-aria-label="globe.aria">当前浏览器不支持链路地球动画。</canvas>
            <div class="route-globe-topline">
              <div class="route-globe-counts" aria-live="polite">
                <span><i class="route-globe-live-dot" aria-hidden="true"></i><strong id="route-globe-node-count">0</strong><span data-i18n="globe.nodes">节点</span></span>
                <span><strong id="route-globe-link-count">0</strong><span data-i18n="globe.links">链路</span></span>
              </div>
            </div>
          </figure>
        </div>
      </section>

      <main>

        <section class="glass-panel topology-panel" aria-labelledby="topology-heading">
          <div class="panel-heading">
            <h2 id="topology-heading" data-i18n="topology.title">链路拓扑</h2>
            <p id="last-updated" class="updated-label" data-i18n="topology.awaiting">等待首个数据快照</p>
          </div>
          <div id="topology-routes" class="topology-routes" aria-live="polite">
            <div class="skeleton-route" aria-hidden="true"></div>
            <div class="skeleton-route" aria-hidden="true"></div>
            <div class="skeleton-route" aria-hidden="true"></div>
          </div>
        </section>

        <section class="insight-layout">
          <article class="glass-panel link-health-panel" aria-labelledby="link-health-heading">
            <div class="panel-heading compact">
              <h2 id="link-health-heading" data-i18n="analysis.title">链路健康</h2>
            </div>
            <div id="link-health-list" class="link-health-list"></div>
          </article>

          <article class="glass-panel node-panel" aria-labelledby="node-heading">
            <div class="panel-heading compact">
              <h2 id="node-heading" data-i18n="nodes.title">受监测节点</h2>
            </div>
            <div id="node-grid" class="node-grid"></div>
          </article>
        </section>

        <section id="error-panel" class="error-panel" hidden role="alert">
          <div class="error-icon" aria-hidden="true">!</div>
          <div>
            <h2 data-i18n="error.title">无法载入面板数据</h2>
            <p id="error-message"></p>
          </div>
        </section>
      </main>
    </div>
  </body>
</html>
