<!doctype html>
<html lang="zh-CN" data-theme="light">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta name="color-scheme" content="light dark" />
    <meta name="theme-color" content="#eeede5" />
    <title>TopoMari</title>
    <link rel="icon" href="/favicon.png" type="image/png" sizes="256x256" />
    <link rel="apple-touch-icon" href="/favicon.png" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Arimo:wght@400..700&amp;family=Noto+Serif+TC:wght@400;500;600;700&amp;display=swap" rel="stylesheet" />
    <script>
      (() => {
        const preferredTheme = () => typeof matchMedia === "function"
          && matchMedia("(prefers-color-scheme: dark)").matches ? "dark" : "light";
        const preferredLanguage = () => typeof navigator !== "undefined"
          && String(navigator.language || "").toLowerCase().startsWith("zh") ? "zh-CN" : "en";
        let theme = preferredTheme();
        let language = preferredLanguage();

        try {
          const savedTheme = localStorage.getItem("topomari-theme");
          if (savedTheme === "light" || savedTheme === "dark") theme = savedTheme;
          const savedLanguage = localStorage.getItem("topomari-language");
          if (savedLanguage === "en" || savedLanguage === "zh-CN") language = savedLanguage;
        } catch {
          // Browser preferences remain active when storage is unavailable.
        }

        document.documentElement.dataset.theme = theme;
        document.documentElement.lang = language;
        document.documentElement.style.colorScheme = theme;
        const themeColor = document.querySelector('meta[name="theme-color"]');
        if (themeColor) themeColor.setAttribute("content", theme === "dark" ? "#1c1b19" : "#eeede5");
      })();
    </script>
    <link rel="stylesheet" href="/styles.css?v=2.5.0-ui" />
    <link rel="stylesheet" href="/frontend/theme.css?v=2.5.0-ui" />
    <script type="module" src="/app.js?v=2.5.0-ui"></script>
  </head>
  <body>
    <div class="ambient ambient-a" aria-hidden="true"></div>
    <div class="ambient ambient-b" aria-hidden="true"></div>

    <div class="app-shell">
      <header class="app-header">
        <div class="brand-lockup">
          <div class="brand-mark" aria-hidden="true">
            <img src="/favicon.png" alt="" />
          </div>
          <h1 id="page-title">TopoMari</h1>
        </div>

        <div class="header-actions">
          <div id="source-chip" class="source-chip" data-mode="loading">
            <span class="source-dot" aria-hidden="true"></span>
            <span id="source-label" data-i18n="source.connecting">正在连接</span>
          </div>
          <div class="language-switch" role="group" data-i18n-aria-label="language.label" aria-label="界面语言">
            <button type="button" data-language-value="zh-CN" aria-pressed="true">中</button>
            <button type="button" data-language-value="en" aria-pressed="false">EN</button>
          </div>
          <button id="theme-toggle" class="utility-button theme-toggle" type="button" aria-label="切换至夜间模式">
            <svg class="theme-icon theme-icon-sun" viewBox="0 0 24 24" aria-hidden="true">
              <circle cx="12" cy="12" r="4" /><path d="M12 2v2M12 20v2M4.9 4.9l1.4 1.4M17.7 17.7l1.4 1.4M2 12h2M20 12h2M4.9 19.1l1.4-1.4M17.7 6.3l1.4-1.4" />
            </svg>
            <svg class="theme-icon theme-icon-moon" viewBox="0 0 24 24" aria-hidden="true">
              <path d="M20.2 15.4A8.5 8.5 0 0 1 8.6 3.8 8.5 8.5 0 1 0 20.2 15.4Z" />
            </svg>
          </button>
          <button id="manager-toggle" class="refresh-button manager-toggle" type="button" hidden aria-expanded="false" aria-controls="topology-manager">
            <svg viewBox="0 0 24 24" aria-hidden="true">
              <path d="M4 7h16M4 17h16M7 4v6M17 14v6" />
            </svg>
            <span data-i18n="actions.manageRoutes">管理链路</span>
          </button>
          <button id="refresh-button" class="refresh-button" type="button">
            <svg viewBox="0 0 24 24" aria-hidden="true">
              <path d="M20 11a8.1 8.1 0 0 0-15.5-3M4 4v4h4M4 13a8.1 8.1 0 0 0 15.5 3M20 20v-4h-4" />
            </svg>
            <span data-i18n="actions.refresh">刷新</span>
          </button>
        </div>
      </header>

      <main>
        <section class="stats-grid" aria-label="网络概览" data-i18n-aria-label="topology.aria">
          <article class="stat-card">
            <div class="stat-icon" aria-hidden="true">
              <svg viewBox="0 0 24 24"><path d="M4 18h16M6 15V9m6 6V5m6 10v-3" /></svg>
            </div>
            <div>
              <p class="stat-label" data-i18n="stats.routes">活动链路</p>
              <p id="stat-routes" class="stat-value">—</p>
              <p id="stat-edges" class="stat-context" data-i18n="stats.waiting">等待数据</p>
            </div>
          </article>
          <article class="stat-card">
            <div class="stat-icon" aria-hidden="true">
              <svg viewBox="0 0 24 24"><rect x="4" y="4" width="16" height="6" rx="2" /><rect x="4" y="14" width="16" height="6" rx="2" /><path d="M8 7h.01M8 17h.01" /></svg>
            </div>
            <div>
              <p class="stat-label" data-i18n="stats.nodes">在线节点</p>
              <p id="stat-nodes" class="stat-value">—</p>
              <p id="stat-node-context" class="stat-context" data-i18n="stats.waiting">等待数据</p>
            </div>
          </article>
          <article class="stat-card">
            <div class="stat-icon" aria-hidden="true">
              <svg viewBox="0 0 24 24"><circle cx="12" cy="12" r="8" /><path d="M12 8v4l3 2" /></svg>
            </div>
            <div>
              <p class="stat-label" data-i18n="stats.latency">平均延迟</p>
              <p id="stat-latency" class="stat-value">—</p>
            </div>
          </article>
          <article class="stat-card">
            <div class="stat-icon" aria-hidden="true">
              <svg viewBox="0 0 24 24"><path d="M12 3 4 7v5c0 5 3.5 8 8 9 4.5-1 8-4 8-9V7z" /><path d="m9 12 2 2 4-4" /></svg>
            </div>
            <div>
              <p class="stat-label" data-i18n="stats.loss">平均丢包</p>
              <p id="stat-loss" class="stat-value">—</p>
            </div>
          </article>
        </section>

        <section class="glass-panel topology-panel" aria-labelledby="topology-heading">
          <div class="panel-heading">
            <h2 id="topology-heading" data-i18n="topology.title">链路拓扑</h2>
            <p id="last-updated" class="updated-label" data-i18n="topology.awaiting">等待首个数据快照</p>
          </div>
          <div id="topology-routes" class="topology-routes" aria-live="polite">
            <div class="skeleton-route" aria-hidden="true"></div>
            <div class="skeleton-route" aria-hidden="true"></div>
            <div class="skeleton-route" aria-hidden="true"></div>
          </div>
        </section>

        <section id="topology-manager" class="glass-panel manager-panel" aria-labelledby="manager-heading" hidden>
          <div class="panel-heading manager-heading">
            <h2 id="manager-heading" data-i18n="manager.title">链路管理器</h2>
            <button id="manager-close" class="manager-button ghost" type="button" data-i18n="manager.close">关闭</button>
          </div>

          <div id="manager-notice" class="manager-notice" hidden role="status"></div>

          <div class="manager-workspace">
            <aside class="route-library" aria-label="已配置链路" data-i18n-aria-label="manager.routeLibraryAria">
              <div class="manager-subheading">
                <div>
                  <span class="manager-label" data-i18n="manager.routes">链路列表</span>
                </div>
                <button id="route-new" class="manager-button" type="button" data-i18n="manager.newRoute">+ 新链路</button>
              </div>
              <div id="route-list" class="route-list"></div>
            </aside>

            <div class="route-editor">
              <div class="route-meta-fields">
                <label>
                  <span data-i18n="manager.routeName">链路名称</span>
                  <input id="route-name-input" type="text" maxlength="160" autocomplete="off" />
                </label>
                <label>
                  <span data-i18n="manager.routeId">链路 ID</span>
                  <input id="route-id-input" type="text" maxlength="128" autocomplete="off" spellcheck="false" />
                </label>
              </div>

              <div id="route-path-builder" class="route-path-builder" aria-label="可交互链路路径" data-i18n-aria-label="manager.pathAria"></div>
              <div id="route-selection-editor" class="selection-editor"></div>

              <div class="manager-actions">
                <span id="route-dirty-state" class="dirty-state" data-i18n="manager.saved">已保存</span>
                <button id="route-delete" class="manager-button danger" type="button" data-i18n="manager.delete">删除链路</button>
                <button id="route-save" class="manager-button primary" type="button" data-i18n="manager.save">保存并应用</button>
              </div>
            </div>
          </div>

          <div class="deployment-panel">
            <div class="manager-subheading deployment-heading">
              <div>
                <span class="manager-label" data-i18n="deploy.title">私有探针部署</span>
                <small data-i18n="deploy.help">目标地址仅用于生成命令，不会保存到面板</small>
              </div>
            </div>
            <div class="deployment-grid">
              <label>
                <span data-i18n="deploy.edge">私有探针链路</span>
                <select id="deploy-edge"></select>
              </label>
              <label>
                <span data-i18n="deploy.agentId">探针 Agent ID</span>
                <input id="deploy-agent" type="text" maxlength="128" spellcheck="false" />
              </label>
              <label>
                <span data-i18n="deploy.host">目标主机 / IP</span>
                <input id="deploy-host" type="text" maxlength="253" placeholder="例如 203.0.113.10" data-i18n-placeholder="deploy.hostPlaceholder" spellcheck="false" />
              </label>
              <label>
                <span data-i18n="deploy.port">目标端口</span>
                <input id="deploy-port" type="number" min="1" max="65535" value="443" />
              </label>
              <label>
                <span data-i18n="deploy.interval">采样间隔（秒）</span>
                <input id="deploy-interval" type="number" min="5" max="3600" value="30" />
              </label>
              <label>
                <span data-i18n="deploy.timeout">超时（秒）</span>
                <input id="deploy-timeout" type="number" min="1" max="60" value="5" />
              </label>
            </div>
            <div class="deployment-actions">
              <button id="deploy-generate" class="manager-button primary" type="button" data-i18n="deploy.generate">生成一次性部署命令</button>
              <span id="deploy-status" class="deployment-status" data-i18n="deploy.validity">部署码 15 分钟有效且只能使用一次</span>
            </div>
            <div id="deploy-command-box" class="command-box" hidden>
              <pre><code id="deploy-command"></code></pre>
              <button id="deploy-copy" class="manager-button" type="button" data-i18n="deploy.copy">复制命令</button>
            </div>
          </div>

          <div class="agent-panel">
            <div class="manager-subheading">
              <div>
                <span class="manager-label" data-i18n="agents.title">已注册探针</span>
              </div>
            </div>
            <div id="agent-list" class="agent-list"></div>
          </div>
        </section>

        <section class="insight-layout">
          <article class="glass-panel link-health-panel" aria-labelledby="link-health-heading">
            <div class="panel-heading compact">
              <h2 id="link-health-heading" data-i18n="analysis.title">链路健康</h2>
            </div>
            <div id="link-health-list" class="link-health-list"></div>
          </article>

          <article class="glass-panel node-panel" aria-labelledby="node-heading">
            <div class="panel-heading compact">
              <h2 id="node-heading" data-i18n="nodes.title">受监测节点</h2>
            </div>
            <div id="node-grid" class="node-grid"></div>
          </article>
        </section>

        <section id="error-panel" class="error-panel" hidden role="alert">
          <div class="error-icon" aria-hidden="true">!</div>
          <div>
            <h2 data-i18n="error.title">无法载入面板数据</h2>
            <p id="error-message"></p>
          </div>
        </section>
      </main>
    </div>
  </body>
</html>
